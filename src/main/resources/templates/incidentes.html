<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Incidentes</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
<header class="topbar"><div class="brand">Incidentes</div><nav class="nav"><a class="secondary" th:href="@{/barrios/{id}(id=${barrio.id})}">Volver</a></nav></header>
<main class="container">
    <h1 class="page-title" th:text="'Incidentes - ' + ${barrio.nombre}">Incidentes</h1>
    <section class="table-card">
        <table>
            <thead><tr><th>Descripcion</th><th>Fecha</th><th>Estado</th></tr></thead>
            <tbody>
            <tr th:each="incidente : ${incidentes}">
                <td th:text="${incidente.descripcion}">Incidente</td>
                <td th:text="${incidente.fecha}">Fecha</td>
                <td><span class="badge" th:text="${incidente.estado}">Estado</span></td>
            </tr>
            </tbody>
        </table>
        <div class="empty" th:if="${#lists.isEmpty(incidentes)}">No hay incidentes para este barrio.</div>
    </section>
</main>
</body>
</html>
