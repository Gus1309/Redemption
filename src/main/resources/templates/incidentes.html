<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Incidentes')}"></head>
<body>
<div class="app-shell">
    <aside th:replace="~{fragments/sidebar :: sidebar('incidentes', ${barrio})}"></aside>
    <main class="main-pane">
        <div class="content-wrap">
            <header th:replace="~{fragments/header :: header('Incidentes', 'Eventos operativos registrados para seguimiento tecnico.', ${barrio})}"></header>

            <div class="header-actions" style="justify-content: flex-start; margin-bottom: 18px;">
                <a class="button" th:if="${param.rol != null && param.rol[0] == 'SEGURIDAD'}"
                   th:href="@{/barrios/{id}/incidentes/nuevo(id=${barrio.id},rol=${param.rol[0]})}">
                    <i data-lucide="plus" aria-hidden="true"></i> Nuevo incidente
                </a>
                <span class="demo-chip" th:if="${param.rol != null && param.rol[0] == 'TECNICO'}">
                    <i data-lucide="wrench" aria-hidden="true"></i> Tecnico actualiza estados
                </span>
            </div>

            <section class="table-panel">
                <div class="table-toolbar">
                    <div>
                        <h2><i data-lucide="wrench" aria-hidden="true"></i> Registro tecnico</h2>
                        <span class="muted" th:text="${#lists.size(incidentes)} + ' incidentes'">0 incidentes</span>
                    </div>
                    <span class="tenant-chip"><i data-lucide="map-pin" aria-hidden="true"></i><span th:text="${barrio.nombre}">Barrio</span></span>
                </div>
                <div class="table-wrap" th:if="${!#lists.isEmpty(incidentes)}">
                    <table>
                        <thead>
                        <tr><th>Descripcion</th><th>Fecha</th><th>Estado</th><th>Seguimiento</th></tr>
                        </thead>
                        <tbody>
                        <tr th:each="incidente : ${incidentes}">
                            <td>
                                <div class="primary-cell" th:text="${incidente.descripcion}">Incidente</div>
                                <div class="secondary-cell">Seguimiento de mantenimiento</div>
                            </td>
                            <td th:text="${incidente.fecha}">Fecha</td>
                            <td>
                                <span class="badge"
                                      th:classappend="${incidente.estado == 'RESUELTO'} ? ' resuelta' : (${incidente.estado == 'EN_REVISION'} ? ' en-proceso' : ' pendiente')"
                                      th:text="${incidente.estado}">Estado</span>
                            </td>
                            <td>
                                <form th:if="${param.rol != null && param.rol[0] == 'TECNICO'}"
                                      th:action="@{/barrios/{id}/incidentes/{incidenteId}/estado(id=${barrio.id},incidenteId=${incidente.id},rol=${param.rol[0]})}"
                                      method="post" class="header-actions" style="justify-content: flex-start;">
                                    <select name="estado" style="border: 1px solid var(--border); border-radius: var(--radius); min-height: 34px; padding: 0 10px;">
                                        <option value="ABIERTO" th:selected="${incidente.estado == 'ABIERTO'}">ABIERTO</option>
                                        <option value="EN_REVISION" th:selected="${incidente.estado == 'EN_REVISION'}">EN_REVISION</option>
                                        <option value="RESUELTO" th:selected="${incidente.estado == 'RESUELTO'}">RESUELTO</option>
                                    </select>
                                    <button type="submit" class="button compact secondary">
                                        <i data-lucide="save" aria-hidden="true"></i> Guardar
                                    </button>
                                </form>
                                <span class="muted" th:unless="${param.rol != null && param.rol[0] == 'TECNICO'}">Solo lectura</span>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
                <div class="empty-state" th:if="${#lists.isEmpty(incidentes)}">
                    <i data-lucide="circle-check" aria-hidden="true"></i>
                    <strong>Sin incidentes</strong>
                    <span>No hay eventos tecnicos registrados para este barrio.</span>
                </div>
            </section>
        </div>
    </main>
</div>
</body>
</html>
