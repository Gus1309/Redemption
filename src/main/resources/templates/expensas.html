<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expensas</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
<header class="topbar"><div class="brand">Expensas</div><nav class="nav"><a class="secondary" th:href="@{/barrios/{id}(id=${barrio.id})}">Volver</a></nav></header>
<main class="container">
    <h1 class="page-title" th:text="'Expensas - ' + ${barrio.nombre}">Expensas</h1>
    <div class="notice">Vista administrativa. El sistema no procesa pagos, cobranzas ni facturacion.</div>
    <section class="table-card">
        <table>
            <thead><tr><th>Periodo</th><th>Monto</th><th>Estado</th></tr></thead>
            <tbody>
            <tr th:each="expensa : ${expensas}">
                <td th:text="${expensa.periodo}">Periodo</td>
                <td th:text="${expensa.monto}">Monto</td>
                <td><span class="badge" th:text="${expensa.estado}">Estado</span></td>
            </tr>
            </tbody>
        </table>
        <div class="empty" th:if="${#lists.isEmpty(expensas)}">No hay expensas administrativas para este barrio.</div>
    </section>
</main>
</body>
</html>
