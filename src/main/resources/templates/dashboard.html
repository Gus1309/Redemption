<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Dashboard')}"></head>
<body>
<div class="app-shell">
    <aside th:replace="~{fragments/sidebar :: sidebar('dashboard', null)}"></aside>
    <main class="main-pane">
        <div class="content-wrap">
            <header th:replace="~{fragments/header :: header('Dashboard general', 'Vista ejecutiva de barrios, operaciones y actividad reciente.', null)}"></header>

            <section class="executive-summary">
                <div>
                    <span class="eyebrow">Resumen del sistema</span>
                    <h2>Operaciones separadas por barrio</h2>
                </div>
                <div class="summary-line">
                    <span><i data-lucide="map" aria-hidden="true"></i><span th:text="${#lists.size(barrios)} + ' barrios'">2 barrios</span></span>
                    <span><i data-lucide="database" aria-hidden="true"></i> Datos en memoria</span>
                    <span><i data-lucide="shield" aria-hidden="true"></i> Acceso simulado</span>
                </div>
            </section>

            <section class="tenant-list">
                <article class="tenant-row" th:each="item : ${barrios}">
                    <div class="tenant-row-main">
                        <span class="tenant-initial"><i data-lucide="building-2" aria-hidden="true"></i></span>
                        <div>
                            <h2 th:text="${item.barrio.nombre}">Los Robles</h2>
                            <p th:text="${item.barrio.descripcion}">Descripcion del barrio</p>
                        </div>
                    </div>

                    <div class="inline-metrics">
                        <span><i data-lucide="clipboard-list" aria-hidden="true"></i><strong th:text="${item.resumen.reclamos}">0</strong> Reclamos</span>
                        <span><i data-lucide="calendar-check" aria-hidden="true"></i><strong th:text="${item.resumen.reservas}">0</strong> Reservas</span>
                        <span><i data-lucide="door-open" aria-hidden="true"></i><strong th:text="${item.resumen.accesos}">0</strong> Accesos</span>
                        <span><i data-lucide="user-check" aria-hidden="true"></i><strong th:text="${#lists.size(item.barrio.autorizaciones)}">0</strong> Visitas</span>
                        <span><i data-lucide="wrench" aria-hidden="true"></i><strong th:text="${item.resumen.incidentes}">0</strong> Incidentes</span>
                        <span><i data-lucide="receipt-text" aria-hidden="true"></i><strong th:text="${item.resumen.expensas}">0</strong> Expensas</span>
                    </div>

                    <div class="row-actions">
                        <a class="button" th:href="@{/barrios/{id}(id=${item.barrio.id},rol=${param.rol != null ? param.rol[0] : null})}"><i data-lucide="arrow-right" aria-hidden="true"></i> Ver panel</a>
                        <a class="button secondary" th:href="@{/barrios/{id}/reclamos(id=${item.barrio.id},rol=${param.rol != null ? param.rol[0] : null})}"><i data-lucide="clipboard-list" aria-hidden="true"></i> Reclamos</a>
                    </div>
                </article>
            </section>
        </div>
    </main>
</div>
</body>
</html>
