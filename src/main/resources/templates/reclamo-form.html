<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Nuevo reclamo')}"></head>
<body>
<div class="app-shell">
    <aside th:replace="~{fragments/sidebar :: sidebar('reclamos', ${barrio})}"></aside>
    <main class="main-pane">
        <div class="content-wrap">
            <header th:replace="~{fragments/header :: header('Nuevo reclamo', 'Registra un reclamo vecinal en estado Pendiente.', ${barrio})}"></header>

            <section class="table-panel">
                <div class="table-toolbar">
                    <div>
                        <h2><i data-lucide="clipboard-list" aria-hidden="true"></i> Datos del reclamo</h2>
                        <span class="muted">Completa la descripcion para registrarlo.</span>
                    </div>
                </div>

                <p class="muted" th:if="${error}" th:text="${error}" style="color: var(--danger); padding: 0 24px;">Error</p>

                <form th:action="@{/barrios/{id}/reclamos(id=${barrio.id})}" method="post" class="login-form" style="padding: 24px;">
                    <input type="hidden" name="rol" th:value="${param.rol != null ? param.rol[0] : null}">
                    <label class="select-field">
                        <span>Descripcion del reclamo</span>
                        <textarea name="descripcion" rows="4" required
                                  style="border: 1px solid var(--border); border-radius: var(--radius); padding: 12px 14px; font: inherit; resize: vertical;"></textarea>
                    </label>

                    <div class="header-actions" style="justify-content: flex-start;">
                        <button type="submit" class="button">
                            <i data-lucide="plus" aria-hidden="true"></i> Crear reclamo
                        </button>
                        <a class="button secondary"
                           th:href="@{/barrios/{id}/reclamos(id=${barrio.id},rol=${param.rol != null ? param.rol[0] : null})}">
                            Cancelar
                        </a>
                    </div>
                </form>
            </section>
        </div>
    </main>
</div>
</body>
</html>
