<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reservas</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
<header class="topbar"><div class="brand">Reservas</div><nav class="nav"><a class="secondary" th:href="@{/barrios/{id}(id=${barrio.id})}">Volver</a></nav></header>
<main class="container">
    <h1 class="page-title" th:text="'Reservas - ' + ${barrio.nombre}">Reservas</h1>
    <section class="table-card">
        <table>
            <thead><tr><th>Amenidad</th><th>Propietario</th><th>Fecha</th><th>Estado</th></tr></thead>
            <tbody>
            <tr th:each="reserva : ${reservas}">
                <td th:text="${reserva.amenidad.nombre}">Amenidad</td>
                <td th:text="${reserva.propietario.nombre}">Propietario</td>
                <td th:text="${reserva.fecha}">Fecha</td>
                <td><span class="badge" th:text="${reserva.estado}">Estado</span></td>
            </tr>
            </tbody>
        </table>
        <div class="empty" th:if="${#lists.isEmpty(reservas)}">No hay reservas para este barrio.</div>
    </section>
</main>
</body>
</html>
