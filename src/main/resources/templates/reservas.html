<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Reservas')}"></head>
<body>
<div class="app-shell">
    <aside th:replace="~{fragments/sidebar :: sidebar('reservas', ${barrio})}"></aside>
    <main class="main-pane">
        <div class="content-wrap">
            <header th:replace="~{fragments/header :: header('Reservas de amenidades', 'Agenda de amenities solicitadas por propietarios.', ${barrio})}"></header>

            <section class="table-panel">
                <div class="table-toolbar">
                    <div>
                        <h2><i data-lucide="calendar-check" aria-hidden="true"></i> Reservas</h2>
                        <span class="muted" th:text="${#lists.size(reservas)} + ' reservas'">0 reservas</span>
                    </div>
                    <span class="tenant-chip"><i data-lucide="map-pin" aria-hidden="true"></i><span th:text="${barrio.nombre}">Barrio</span></span>
                </div>
                <div class="table-wrap" th:if="${!#lists.isEmpty(reservas)}">
                    <table>
                        <thead>
                        <tr><th>Amenidad</th><th>Propietario</th><th>Fecha</th><th>Estado</th></tr>
                        </thead>
                        <tbody>
                        <tr th:each="reserva : ${reservas}">
                            <td>
                                <div class="primary-cell" th:text="${reserva.amenidad.nombre}">Amenidad</div>
                                <div class="secondary-cell" th:text="${reserva.amenidad.descripcion}">Descripcion</div>
                            </td>
                            <td th:text="${reserva.propietario.nombre}">Propietario</td>
                            <td th:text="${reserva.fecha}">Fecha</td>
                            <td><span class="badge reservada" th:text="${reserva.estado}">Estado</span></td>
                        </tr>
                        </tbody>
                    </table>
                </div>
                <div class="empty-state" th:if="${#lists.isEmpty(reservas)}">
                    <i data-lucide="calendar-x" aria-hidden="true"></i>
                    <strong>Sin reservas</strong>
                    <span>No hay amenidades reservadas para este barrio.</span>
                </div>
            </section>
        </div>
    </main>
</div>
</body>
</html>
