<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<header class="page-header" th:fragment="header(title, subtitle, tenant)">
    <div>
        <div class="breadcrumb">
            <a th:href="@{/dashboard}">Dashboard</a>
            <span th:if="${tenant != null}">/</span>
            <span th:if="${tenant != null}" th:text="${tenant.nombre}">Barrio</span>
        </div>
        <h1 th:text="${title}">Titulo</h1>
        <p th:text="${subtitle}">Subtitulo</p>
    </div>
    <div class="header-actions">
        <span class="demo-chip" th:if="${param.rol != null}" th:text="'Rol: ' + ${param.rol[0]}">Rol</span>
        <span class="tenant-chip" th:if="${tenant != null}" th:text="'Tenant: ' + ${tenant.nombre}">Tenant</span>
        <span class="demo-chip">Sistema demo</span>
    </div>
</header>
</html>
