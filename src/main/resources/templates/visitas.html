<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Visitas')}"></head>
<body>
<div class="app-shell">
    <aside th:replace="~{fragments/sidebar :: sidebar('visitas', ${barrio})}"></aside>
    <main class="main-pane">
        <div class="content-wrap">
            <header th:replace="~{fragments/header :: header('Visitas autorizadas', 'Control de visitantes habilitados para ingresar al barrio.', ${barrio})}"></header>

            <div class="header-actions" style="justify-content: flex-start; margin-bottom: 18px;">
                <a class="button"
                   th:if="${param.rol != null && param.rol[0] == 'PROPIETARIO'}"
                   th:href="@{/barrios/{id}/visitas/nueva(id=${barrio.id},rol=${param.rol[0]})}">
                    <i data-lucide="plus" aria-hidden="true"></i> Nueva autorizacion
                </a>
            </div>

            <section class="table-panel">
                <div class="table-toolbar">
                    <div>
                        <h2><i data-lucide="user-check" aria-hidden="true"></i> Autorizaciones</h2>
                        <span class="muted" th:text="${#lists.size(visitas)} + ' registros'">0 registros</span>
                    </div>
                    <span class="tenant-chip"><i data-lucide="map-pin" aria-hidden="true"></i><span th:text="${barrio.nombre}">Barrio</span></span>
                </div>
                <div class="table-wrap" th:if="${!#lists.isEmpty(visitas)}">
                    <table>
                        <thead>
                        <tr><th>Visitante</th><th>Documento</th><th>Propietario</th><th>Vigencia</th><th>Estado</th></tr>
                        </thead>
                        <tbody>
                        <tr th:each="visita : ${visitas}">
                            <td>
                                <div class="primary-cell" th:text="${visita.visitante.nombre}">Juan Perez</div>
                                <div class="secondary-cell">Visitante autorizado</div>
                            </td>
                            <td th:text="${visita.visitante.documento}">000</td>
                            <td th:text="${visita.propietario.nombre}">Propietario</td>
                            <td>
                                <div class="primary-cell" th:text="${visita.fechaDesde}">Desde</div>
                                <div class="secondary-cell" th:text="${visita.fechaHasta != null && visita.fechaHasta != visita.fechaDesde ? 'hasta ' + visita.fechaHasta : 'un dia'}">Hasta</div>
                            </td>
                            <td><span class="badge autorizada" th:text="${visita.estado}">Estado</span></td>
                        </tr>
                        </tbody>
                    </table>
                </div>
                <div class="empty-state" th:if="${#lists.isEmpty(visitas)}">
                    <i data-lucide="user-x" aria-hidden="true"></i>
                    <strong>Sin visitas autorizadas</strong>
                    <span>Este barrio no tiene autorizaciones cargadas.</span>
                </div>
            </section>
        </div>
    </main>
</div>
</body>
</html>
