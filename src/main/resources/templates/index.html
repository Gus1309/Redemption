<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Acceso')}"></head>
<body>
<main class="login-shell">
    <section class="login-panel fade-up">
        <div class="login-brand">
            <span class="brand-mark"><i data-lucide="building-2" aria-hidden="true"></i></span>
            <div>
                <strong>Barrios Privados</strong>
                <small>Acceso demo</small>
            </div>
        </div>

        <div class="login-heading">
            <h1>Acceso al panel</h1>
            <p>Selecciona tu perfil y el barrio para continuar.</p>
        </div>

        <form id="loginForm" class="login-form">
            <fieldset class="role-grid role-list">
                <legend>Perfil de usuario</legend>

                <label class="role-card">
                    <input type="radio" name="rol" value="ADMINISTRADOR" checked>
                    <span class="role-icon"><i data-lucide="briefcase-business" aria-hidden="true"></i></span>
                    <span>
                        <strong>Administrador</strong>
                        <small>Gestion general, novedades y expensas.</small>
                    </span>
                </label>

                <label class="role-card">
                    <input type="radio" name="rol" value="PROPIETARIO">
                    <span class="role-icon"><i data-lucide="home" aria-hidden="true"></i></span>
                    <span>
                        <strong>Propietario</strong>
                        <small>Visitas, reservas y reclamos.</small>
                    </span>
                </label>

                <label class="role-card">
                    <input type="radio" name="rol" value="SEGURIDAD">
                    <span class="role-icon"><i data-lucide="shield-check" aria-hidden="true"></i></span>
                    <span>
                        <strong>Seguridad</strong>
                        <small>Accesos y visitantes autorizados.</small>
                    </span>
                </label>

                <label class="role-card">
                    <input type="radio" name="rol" value="TECNICO">
                    <span class="role-icon"><i data-lucide="wrench" aria-hidden="true"></i></span>
                    <span>
                        <strong>Tecnico</strong>
                        <small>Reclamos e incidentes operativos.</small>
                    </span>
                </label>
            </fieldset>

            <label class="select-field">
                <span>Barrio inicial</span>
                <select name="barrioId" id="barrioId">
                    <option value="1">Los Robles</option>
                    <option value="2">La Escondida</option>
                </select>
            </label>

            <label class="select-field" id="loteField" style="display:none;">
                <span>Numero de lote</span>
                <input type="text" name="lote" id="lote" placeholder="Ej: 15">
            </label>

            <button class="button login-submit" type="submit"><i data-lucide="log-in" aria-hidden="true"></i> Ingresar al panel</button>
        </form>
    </section>
</main>

<script>
    const roleInputs = document.querySelectorAll('input[name="rol"]');
    const loteField = document.getElementById("loteField");

    function actualizarCampoLote() {
        const rolSeleccionado = document.querySelector('input[name="rol"]:checked').value;
        const esPropietario = rolSeleccionado === "PROPIETARIO";
        loteField.style.display = esPropietario ? "grid" : "none";
        document.getElementById("lote").required = esPropietario;
        if (!esPropietario) {
            document.getElementById("lote").value = "";
        }
    }

    roleInputs.forEach(input => input.addEventListener("change", actualizarCampoLote));
    actualizarCampoLote();

    document.getElementById("loginForm").addEventListener("submit", function (event) {
        event.preventDefault();
        const rol = new FormData(event.currentTarget).get("rol");
        const barrioId = document.getElementById("barrioId").value;
        const lote = document.getElementById("lote").value;

        let url = `/barrios/${barrioId}?rol=${encodeURIComponent(rol)}`;
        if (rol === "PROPIETARIO" && lote) {
            url += `&lote=${encodeURIComponent(lote)}`;
        }
        console.log("Redirigiendo a:", url, "| rol:", rol, "| lote:", lote);
        window.location.href = url;
    });
</script>
</body>
</html>
