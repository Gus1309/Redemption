<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Accesos')}"></head>
<body>
<div class="app-shell">
    <aside th:replace="~{fragments/sidebar :: sidebar('accesos', ${barrio})}"></aside>
    <main class="main-pane">
        <div class="content-wrap">
            <header th:replace="~{fragments/header :: header('Registro de accesos', 'Ingresos y egresos registrados por seguridad.', ${barrio})}"></header>

            <section class="table-panel">
                <div class="table-toolbar">
                    <div>
                        <h2><i data-lucide="door-open" aria-hidden="true"></i> Movimientos</h2>
                        <span class="muted" th:text="${#lists.size(accesos)} + ' movimientos'">0 movimientos</span>
                    </div>
                    <span class="tenant-chip"><i data-lucide="map-pin" aria-hidden="true"></i><span th:text="${barrio.nombre}">Barrio</span></span>
                </div>
                <div class="table-wrap" th:if="${!#lists.isEmpty(accesos)}">
                    <table>
                        <thead>
                        <tr><th>Visitante</th><th>Tipo</th><th>Fecha y hora</th></tr>
                        </thead>
                        <tbody>
                        <tr th:each="acceso : ${accesos}">
                            <td>
                                <div class="primary-cell" th:text="${acceso.visitante.nombre}">Visitante</div>
                                <div class="secondary-cell" th:text="${acceso.visitante.documento}">Documento</div>
                            </td>
                            <td>
                                <span class="badge"
                                      th:classappend="${acceso.tipoAcceso == 'INGRESO'} ? ' ingreso' : ' egreso'"
                                      th:text="${acceso.tipoAcceso}">INGRESO</span>
                            </td>
                            <td th:text="${acceso.fecha}">Fecha</td>
                        </tr>
                        </tbody>
                    </table>
                </div>
                <div class="empty-state" th:if="${#lists.isEmpty(accesos)}">
                    <i data-lucide="door-closed" aria-hidden="true"></i>
                    <strong>Sin accesos registrados</strong>
                    <span>No hay ingresos ni egresos para este barrio.</span>
                </div>
            </section>
        </div>
    </main>
</div>
</body>
</html>
